name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # This allows you to manually run it from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_site:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes the Node.js deprecation warning
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Updated for 2026 standards
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          VITE_GOOGLE_SHEET_URL: ${{ secrets.VITE_GOOGLE_SHEET_URL }}

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages # This name must match the environment in your Settings
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4